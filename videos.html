    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .tonal-transition {
        transition: background-color 0.3s ease;

      }
      .no-line {
        border: none !important;
      }
